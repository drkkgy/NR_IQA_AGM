# ============================================================
# NR-IQA AGM — Conda environment (from nr_iqa env, CUDA 11.8)
#
# Create:   conda env create -f environment.yml
# Activate: conda activate nr_iqa_agm
#
# Full original export: environment_orig.yml
# ============================================================
name: nr_iqa_agm
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11.11
  - pip

  # pip-installed packages (PyTorch + CUDA 11.8 wheels + everything else)
  - pip:
      # PyTorch (CUDA 11.8)
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch==2.6.0+cu118
      - torchvision==0.21.0+cu118
      - torchaudio==2.6.0+cu118

      # HuggingFace ecosystem
      - transformers==4.50.0
      - accelerate==1.5.2
      - peft==0.15.0
      - safetensors==0.5.3
      - huggingface-hub==0.29.3
      - tokenizers==0.21.1
      - datasets==3.4.1
      - diffusers==0.32.2

      # Logging
      - wandb==0.19.8

      # Scientific / numerical
      - numpy==2.1.2
      - scipy==1.15.2
      - scikit-learn==1.6.1
      - pandas==2.2.3
      - openpyxl==3.1.5

      # Image processing
      - Pillow==11.0.0
      - opencv-python==4.11.0.86

      # Visualisation
      - grad-cam==1.5.5
      - matplotlib==3.3.4

      # Progress bars
      - tqdm==4.65.2

      # Other utilities
      - h5py==3.13.0
      - einops==0.8.1
      - pyyaml==6.0.2
      - filelock==3.14.0
      - fsspec==2024.6.1
      - regex==2024.11.6
      - jinja2==3.1.4
